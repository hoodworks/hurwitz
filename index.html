<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hurwitz Creative — Deliverables</title>
  <style>
    /* ─── RESET ─────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    /* ─── TOKENS ─────────────────────────────────────────── */
    :root {
      --red:       #7A1218;
      --red-dim:   #5a0d12;
      --bg:        #141414;
      --bg-card:   #1E1E1E;
      --bg-hover:  #252525;
      --rule:      #2E2E2E;
      --text:      #E8E2DC;
      --text-muted:#888880;
      --text-dim:  #555;
      --accent:    #C5A44A;   /* gold for Frame.io links */
      --font-sans: 'Inter', 'Helvetica Neue', Arial, sans-serif;
      --font-mono: 'JetBrains Mono', 'Fira Code', monospace;
      --radius:    6px;
      --max:       900px;
    }

    /* ─── BASE ───────────────────────────────────────────── */
    html { font-size: 15px; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-sans);
      line-height: 1.6;
      min-height: 100vh;
    }

    /* ─── HEADER ─────────────────────────────────────────── */
    .site-header {
      border-bottom: 1px solid var(--rule);
      padding: 20px 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      background: rgba(20,20,20,0.95);
      backdrop-filter: blur(8px);
      z-index: 100;
    }

    .wordmark {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    /* SVG logo block */
    .logo-badge {
      width: 42px;
      height: 42px;
      background: var(--red);
      border-radius: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .logo-badge svg { width: 30px; height: 30px; }

    .wordmark-text {
      display: flex;
      flex-direction: column;
    }
    .wordmark-name {
      font-size: 0.95rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text);
      line-height: 1.1;
    }
    .wordmark-tag {
      font-size: 0.65rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-top: 2px;
    }

    .header-meta {
      font-size: 0.7rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-dim);
    }

    /* ─── MAIN ───────────────────────────────────────────── */
    main {
      max-width: var(--max);
      margin: 0 auto;
      padding: 48px 24px 80px;
    }

    /* ─── PAGE TITLE ─────────────────────────────────────── */
    .page-title-block {
      margin-bottom: 48px;
      border-left: 3px solid var(--red);
      padding-left: 16px;
    }
    .page-title-block .eyebrow {
      font-size: 0.65rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 6px;
    }
    .page-title-block h1 {
      font-size: 1.5rem;
      font-weight: 700;
      letter-spacing: -0.01em;
      color: var(--text);
    }
    .page-title-block p {
      font-size: 0.82rem;
      color: var(--text-muted);
      margin-top: 6px;
    }

    /* ─── CLIENT CARD ────────────────────────────────────── */
    .client-block {
      margin-bottom: 48px;
    }

    .client-header {
      display: flex;
      align-items: flex-end;
      gap: 16px;
      margin-bottom: 20px;
      padding-bottom: 14px;
      border-bottom: 1px solid var(--rule);
    }

    .client-logo-slot {
      width: 52px;
      height: 52px;
      background: #252525;
      border: 1px solid var(--rule);
      border-radius: 5px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      overflow: hidden;
    }
    .client-logo-slot img {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }
    .client-logo-slot .logo-initials {
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.06em;
      color: var(--text-muted);
      text-align: center;
      line-height: 1.2;
    }

    .client-info { flex: 1; }
    .client-info .client-eyebrow {
      font-size: 0.6rem;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--red);
      margin-bottom: 3px;
      font-weight: 600;
    }
    .client-info h2 {
      font-size: 1.1rem;
      font-weight: 700;
      letter-spacing: 0.01em;
      color: var(--text);
    }

    .client-count {
      font-size: 0.68rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-dim);
      white-space: nowrap;
      padding-bottom: 4px;
    }

    /* ─── PROJECT GROUP ──────────────────────────────────── */
    .project-group {
      margin-bottom: 20px;
    }

    .project-label {
      font-size: 0.65rem;
      font-weight: 600;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 8px;
      padding-left: 2px;
    }

    /* ─── ASSET LINK ROWS ────────────────────────────────── */
    .asset-list {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .asset-row {
      display: flex;
      align-items: center;
      background: var(--bg-card);
      border: 1px solid var(--rule);
      border-radius: var(--radius);
      padding: 10px 14px;
      text-decoration: none;
      color: var(--text);
      gap: 12px;
      transition: background 0.15s, border-color 0.15s;
    }
    .asset-row:hover {
      background: var(--bg-hover);
      border-color: #3e3e3e;
    }
    .asset-row:hover .asset-title {
      color: #fff;
    }

    .asset-icon {
      width: 28px;
      height: 28px;
      border-radius: 4px;
      background: var(--bg);
      border: 1px solid #2a2a2a;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .asset-icon svg {
      width: 14px;
      height: 14px;
      opacity: 0.7;
    }

    .asset-title {
      flex: 1;
      font-size: 0.85rem;
      font-weight: 500;
      color: var(--text);
      transition: color 0.15s;
    }

    .asset-badge {
      font-size: 0.6rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 2px 7px;
      border-radius: 3px;
      white-space: nowrap;
    }
    .badge-9-16  { background: #1a2a1a; color: #6db86d; border: 1px solid #2a3a2a; }
    .badge-16-9  { background: #1a1a2a; color: #6d8cd8; border: 1px solid #2a2a3a; }
    .badge-pdf   { background: #2a1a1a; color: #d88; border: 1px solid #3a2a2a; }
    .badge-deck  { background: #2a201a; color: #d8a06d; border: 1px solid #3a302a; }
    .badge-doc   { background: #1a2226; color: #6db8cc; border: 1px solid #2a3236; }
    .badge-still { background: #26221a; color: #c4b060; border: 1px solid #363020; }
    .badge-link  { background: #201a26; color: #a87dd8; border: 1px solid #302a36; }

    .asset-arrow {
      color: var(--text-dim);
      font-size: 0.75rem;
      flex-shrink: 0;
      opacity: 0.5;
    }

    /* ─── NOTE ROWS (no link) ────────────────────────────── */
    .asset-row.no-link {
      cursor: default;
      opacity: 0.5;
      pointer-events: none;
    }

    /* ─── EMPTY SLOT ─────────────────────────────────────── */
    .asset-row.empty-slot {
      border-style: dashed;
      opacity: 0.35;
      pointer-events: none;
    }

    /* ─── SECTION DIVIDER ────────────────────────────────── */
    .section-divider {
      border: none;
      border-top: 1px solid var(--rule);
      margin: 40px 0;
    }

    /* ─── FOOTER ─────────────────────────────────────────── */
    footer {
      border-top: 1px solid var(--rule);
      padding: 20px 32px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      max-width: 100%;
    }
    footer p {
      font-size: 0.68rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text-dim);
    }

    @media (max-width: 600px) {
      .site-header { padding: 14px 16px; }
      main { padding: 32px 16px 60px; }
      .client-header { flex-wrap: wrap; gap: 10px; }
      .asset-badge { display: none; }
    }
  </style>
</head>
<body>

<!-- ═══════════════════════════════════════════════════════════
     HEADER
════════════════════════════════════════════════════════════ -->
<header class="site-header">
  <div class="wordmark">
    <div class="logo-badge">
      <!-- Hurwitz "H" badge — replace with <img> of logo if available -->
      <svg viewBox="0 0 30 30" fill="none" xmlns="http://www.w3.org/2000/svg">
        <text x="5" y="22" font-family="Arial Black, sans-serif" font-weight="900"
              font-size="22" fill="white">H</text>
      </svg>
    </div>
    <div class="wordmark-text">
      <span class="wordmark-name">Hurwitz Creative</span>
      <span class="wordmark-tag">Deliverables Portal</span>
    </div>
  </div>
  <div class="header-meta" id="last-updated"></div>
</header>

<!-- ═══════════════════════════════════════════════════════════
     MAIN CONTENT — rendered by JS from DATA below
════════════════════════════════════════════════════════════ -->
<main id="root"></main>

<footer>
  <p>Hurwitz Creative · Internal Use Only</p>
  <p id="footer-date"></p>
</footer>

<!-- ═══════════════════════════════════════════════════════════
     ██████████████████████████████████████████████████████
     DATA — EDIT THIS SECTION TO UPDATE THE PAGE
     ██████████████████████████████████████████████████████

     CLIENTS: array of client objects
       name        — displayed client name
       logoUrl     — path to logo image (optional; leave "" for initials)
       logoAlt     — alt text / initials fallback
       description — short italicized note under client name
       projects    — array of project groups
         label     — section heading (e.g. "Shōya House Exhibition")
         assets    — array of asset links
           title   — asset display name
           url     — Frame.io link (or any URL); "" = placeholder slot
           badge   — one of: "9:16" "16:9" "PDF" "Deck" "Doc" "Still" "Link"

════════════════════════════════════════════════════════════ -->
<script>
const LAST_UPDATED = "June 2025";

const CLIENTS = [

  /* ── THE HUNTINGTON ────────────────────────────────────── */
  {
    name: "The Huntington",
    logoUrl: "",
    logoAlt: "TH",
    description: "Japanese Heritage Shōya House — Exhibition Lifecycle Campaign",
    projects: [
      {
        label: "Pre-Launch Teasers",
        assets: [
          {
            title: "Teaser 1 — \"Something moved 6,000 miles\" (9:16 · 15s)",
            url: "https://app.frame.io/",
            badge: "9:16"
          },
          {
            title: "Teaser 2 — \"Hidden details\" hook (9:16 · 15s)",
            url: "",
            badge: "9:16"
          }
        ]
      },
      {
        label: "Launch Week",
        assets: [
          {
            title: "Launch Featurette — \"A Family Gives Its Home\" (9:16 · 60s)",
            url: "",
            badge: "9:16"
          }
        ]
      },
      {
        label: "Mid-Run Sustainers",
        assets: [
          {
            title: "Sustainer 1 — The Family Crest (9:16 · 45s)",
            url: "",
            badge: "9:16"
          },
          {
            title: "Sustainer 2 — The Two-Door Rule (9:16 · 45s)",
            url: "",
            badge: "9:16"
          },
          {
            title: "Sustainer 3 — The 820 Stones (9:16 · 45s)",
            url: "",
            badge: "9:16"
          },
          {
            title: "Sustainer 4 — Zero Nails (9:16 · 45s)",
            url: "",
            badge: "9:16"
          },
          {
            title: "Sustainer 5 — Sustainable Farming Loop (9:16 · 45s)",
            url: "",
            badge: "9:16"
          }
        ]
      },
      {
        label: "Horizontal Master",
        assets: [
          {
            title: "\"Making Of\" Mini-Documentary (16:9 · 2–3 min)",
            url: "",
            badge: "16:9"
          }
        ]
      },
      {
        label: "Pitch Materials",
        assets: [
          {
            title: "Unboxing the Museum — Pitch Deck",
            url: "https://app.frame.io/",
            badge: "Deck"
          },
          {
            title: "Rate Sheet Leave-Behind",
            url: "",
            badge: "PDF"
          }
        ]
      }
    ]
  },

  /* ── ADD ANOTHER CLIENT BELOW — copy/paste this block ──
  {
    name: "Client Name",
    logoUrl: "",
    logoAlt: "CL",
    description: "Campaign or project description",
    projects: [
      {
        label: "Project Group Label",
        assets: [
          { title: "Asset Title", url: "https://app.frame.io/YOUR_LINK", badge: "9:16" },
          { title: "Another Asset", url: "", badge: "16:9" }
        ]
      }
    ]
  },
  ────────────────────────────────────────────────────────── */

];

/* ─── BADGE CLASS MAP ──────────────────────────────────────── */
const BADGE_CLASS = {
  "9:16":  "badge-9-16",
  "16:9":  "badge-16-9",
  "PDF":   "badge-pdf",
  "Deck":  "badge-deck",
  "Doc":   "badge-doc",
  "Still": "badge-still",
  "Link":  "badge-link"
};

/* ─── ICONS ─────────────────────────────────────────────────── */
function iconFor(badge) {
  if (badge === "9:16") return `<svg viewBox="0 0 16 16" fill="none">
    <rect x="4" y="1" width="8" height="14" rx="1.5" stroke="currentColor" stroke-width="1.4"/>
  </svg>`;
  if (badge === "16:9") return `<svg viewBox="0 0 16 16" fill="none">
    <rect x="1" y="4" width="14" height="8" rx="1.5" stroke="currentColor" stroke-width="1.4"/>
  </svg>`;
  if (badge === "PDF" || badge === "Deck" || badge === "Doc") return `<svg viewBox="0 0 16 16" fill="none">
    <path d="M4 1h5l4 4v10H4V1z" stroke="currentColor" stroke-width="1.3" stroke-linejoin="round"/>
    <path d="M9 1v4h4" stroke="currentColor" stroke-width="1.3" stroke-linejoin="round"/>
  </svg>`;
  if (badge === "Still") return `<svg viewBox="0 0 16 16" fill="none">
    <rect x="1" y="2.5" width="14" height="11" rx="1.5" stroke="currentColor" stroke-width="1.3"/>
    <circle cx="5.5" cy="6.5" r="1.5" stroke="currentColor" stroke-width="1.2"/>
    <path d="M1 11l4-3.5 3 2.5 2.5-2 4.5 3.5" stroke="currentColor" stroke-width="1.2" stroke-linejoin="round"/>
  </svg>`;
  // default / Link
  return `<svg viewBox="0 0 16 16" fill="none">
    <path d="M6.5 9.5a3.5 3.5 0 005 0l2-2a3.5 3.5 0 00-5-5l-1 1" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
    <path d="M9.5 6.5a3.5 3.5 0 00-5 0l-2 2a3.5 3.5 0 005 5l1-1" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
  </svg>`;
}

/* ─── RENDER ─────────────────────────────────────────────────── */
function countAssets(client) {
  return client.projects.reduce((n, p) => n + p.assets.length, 0);
}

function renderAsset(asset) {
  const hasLink = asset.url && asset.url.trim() !== "";
  const badgeClass = BADGE_CLASS[asset.badge] || "badge-link";
  const rowClass = `asset-row${hasLink ? "" : " empty-slot"}`;
  const tag = hasLink ? "a" : "div";
  const href = hasLink ? `href="${asset.url}" target="_blank" rel="noopener"` : "";
  return `
    <${tag} class="${rowClass}" ${href}>
      <div class="asset-icon">${iconFor(asset.badge)}</div>
      <span class="asset-title">${asset.title}</span>
      <span class="asset-badge ${badgeClass}">${asset.badge}</span>
      ${hasLink ? '<span class="asset-arrow">↗</span>' : '<span class="asset-arrow">—</span>'}
    </${tag}>
  `;
}

function renderProject(project) {
  return `
    <div class="project-group">
      <div class="project-label">${project.label}</div>
      <div class="asset-list">
        ${project.assets.map(renderAsset).join("")}
      </div>
    </div>
  `;
}

function renderClient(client, index) {
  const count = countAssets(client);
  const logoContent = client.logoUrl
    ? `<img src="${client.logoUrl}" alt="${client.logoAlt}" />`
    : `<span class="logo-initials">${client.logoAlt}</span>`;

  return `
    ${index > 0 ? '<hr class="section-divider">' : ""}
    <section class="client-block">
      <div class="client-header">
        <div class="client-logo-slot">${logoContent}</div>
        <div class="client-info">
          <div class="client-eyebrow">Client</div>
          <h2>${client.name}</h2>
          ${client.description ? `<p style="font-size:0.75rem;color:var(--text-muted);margin-top:3px;font-style:italic;">${client.description}</p>` : ""}
        </div>
        <div class="client-count">${count} asset${count !== 1 ? "s" : ""}</div>
      </div>
      ${client.projects.map(renderProject).join("")}
    </section>
  `;
}

function renderPageTitle() {
  return `
    <div class="page-title-block">
      <div class="eyebrow">Hurwitz Creative · Internal</div>
      <h1>Deliverables &amp; Links</h1>
      <p>Frame.io links and pitch materials organized by client. For internal review only.</p>
    </div>
  `;
}

document.getElementById("root").innerHTML =
  renderPageTitle() + CLIENTS.map(renderClient).join("");

document.getElementById("last-updated").textContent = "Updated " + LAST_UPDATED;
document.getElementById("footer-date").textContent = "Updated " + LAST_UPDATED;
</script>
</body>
</html>
